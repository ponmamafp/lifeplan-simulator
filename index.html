<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ライフプラン シミュレーター</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2.15.0/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap');
    body { margin: 0; }
    #loading { font-family: "Zen Maru Gothic", system-ui, sans-serif; color: #9C8F85; }
  </style>
</head>
<body>
  <div id="root"><p id="loading" style="text-align:center;padding:40px;">読み込み中…</p></div>

  <script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect } = React;
const {
  ResponsiveContainer,
  ComposedChart,
  Area,
  Line,
  XAxis,
  YAxis,
  CartesianGrid,
  Tooltip,
  ReferenceLine,
} = Recharts;

// ───────────────────────────────────────────────
// データ保存（この端末のブラウザに自動保存）
// ───────────────────────────────────────────────
const SAVE_KEY = "lifeplan_v1";
const saved = (() => {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)) || {}; }
  catch (e) { return {}; }
})();
const S = (key, def) => (saved[key] !== undefined ? saved[key] : def);

// ───────────────────────────────────────────────
// カラーパレット：あたたかいクリーム × コーラル × セージ
// ───────────────────────────────────────────────
const C = {
  ink: "#4A4039", // 文字（こげ茶）
  coral: "#E08576", // メイン（コーラルピンク）
  coralSoft: "#FBEAE6",
  sage: "#7FA88B", // 改善後・プラス（セージグリーン)
  sageSoft: "#EDF4EF",
  honey: "#E8B04B", // アクセント（はちみつ）
  alert: "#D6705F",
  cream: "#FBF7F1", // 背景
  card: "#FFFFFF",
  line: "#EFE7DC",
  sub: "#9C8F85",
};

// 教育費の年額目安（万円）— 面談時に調整する前提のたたき台
const EDU = {
  公立中心: { pre: 20, elem: 35, jhs: 54, hs: 51, uni: 67 },
  高校から私立: { pre: 20, elem: 35, jhs: 54, hs: 105, uni: 118 },
  私立多め: { pre: 35, elem: 167, jhs: 144, hs: 105, uni: 118 },
};

function eduCostForAge(childAge, plan) {
  const e = EDU[plan];
  if (childAge < 0) return 0;
  if (childAge <= 5) return e.pre;
  if (childAge <= 11) return e.elem;
  if (childAge <= 14) return e.jhs;
  if (childAge <= 17) return e.hs;
  if (childAge <= 21) return e.uni;
  return 0;
}

const man = (v) =>
  (v < 0 ? "−" : "") + Math.abs(Math.round(v)).toLocaleString("ja-JP");
const yenFromMan = (v) => Math.round(v * 10000).toLocaleString("ja-JP");
// 億超えは「1億2,340万」の形で表示
const fmtMan = (v) => {
  const n = Math.round(v);
  const neg = n < 0 ? "−" : "";
  const a = Math.abs(n);
  if (a >= 10000) {
    const oku = Math.floor(a / 10000);
    const rest = a % 10000;
    return rest > 0
      ? `${neg}${oku.toLocaleString("ja-JP")}億${rest.toLocaleString("ja-JP")}万`
      : `${neg}${oku.toLocaleString("ja-JP")}億`;
  }
  return `${neg}${a.toLocaleString("ja-JP")}万`;
};

// ───────────────────────────────────────────────
// ＋/−ステッパー（スマホで指1本で操作できる）
// ───────────────────────────────────────────────
function Stepper({ label, value, onChange, step = 1, min = 0, max = 9999, unit, hint }) {
  const dec = () => onChange(Math.max(min, +(value - step).toFixed(2)));
  const inc = () => onChange(Math.min(max, +(value + step).toFixed(2)));
  const handleInput = (e) => {
    const v = parseFloat(e.target.value);
    onChange(isNaN(v) ? min : Math.min(max, Math.max(min, v)));
  };
  return (
    <div className="py-2">
      <div className="flex items-center justify-between gap-2">
        <span className="text-sm font-medium" style={{ color: C.ink }}>
          {label}
        </span>
        <div className="flex items-center gap-1">
          <button
            onClick={dec}
            aria-label={`${label}を減らす`}
            className="flex h-9 w-9 items-center justify-center rounded-full text-lg font-bold active:scale-95"
            style={{ background: C.coralSoft, color: C.coral }}
          >
            −
          </button>
          <span className="flex w-[5rem] items-baseline justify-center">
            <input
              type="number"
              inputMode="decimal"
              value={value}
              step={step}
              onChange={handleInput}
              onFocus={(e) => e.target.select()}
              aria-label={`${label}を直接入力`}
              className="w-12 rounded-lg bg-transparent text-center text-base font-bold tabular-nums outline-none focus:ring-2"
              style={{ color: C.ink, border: `1px dashed ${C.line}` }}
            />
            <span className="ml-0.5 text-xs font-medium" style={{ color: C.sub }}>
              {unit}
            </span>
          </span>
          <button
            onClick={inc}
            aria-label={`${label}を増やす`}
            className="flex h-9 w-9 items-center justify-center rounded-full text-lg font-bold active:scale-95"
            style={{ background: C.coralSoft, color: C.coral }}
          >
            ＋
          </button>
        </div>
      </div>
      {hint && (
        <p className="mt-0.5 text-[11px]" style={{ color: C.sub }}>
          {hint}
        </p>
      )}
    </div>
  );
}

function Pill({ active, onClick, children, color = C.coral }) {
  return (
    <button
      onClick={onClick}
      className="rounded-full px-3.5 py-1.5 text-xs font-bold transition active:scale-95"
      style={{
        background: active ? color : C.card,
        color: active ? "#fff" : C.sub,
        border: `1.5px solid ${active ? color : C.line}`,
      }}
    >
      {children}
    </button>
  );
}

function Card({ icon, title, children }) {
  return (
    <section
      className="rounded-3xl p-4 sm:p-5"
      style={{ background: C.card, border: `1px solid ${C.line}` }}
    >
      <h3
        className="mb-1.5 flex items-center gap-2 text-[15px] font-bold"
        style={{ color: C.ink }}
      >
        <span aria-hidden>{icon}</span>
        {title}
      </h3>
      {children}
    </section>
  );
}

// ───────────────────────────────────────────────
// 本体
// ───────────────────────────────────────────────
function LifePlanSimulator() {
  // 基本（月ベースで入力）
  const [age, setAge] = useState(S("age", 38));
  const [retireAge, setRetireAge] = useState(S("retireAge", 65));
  const [endAge, setEndAge] = useState(S("endAge", 95));
  const [incomeM, setIncomeM] = useState(S("incomeM", 38)); // 手取り月収（万）
  const [bonus, setBonus] = useState(S("bonus", 80)); // ボーナス（年・万）
  const [livingM, setLivingM] = useState(S("livingM", 20)); // 月の生活費（住居・教育のぞく）
  const [pension, setPension] = useState(S("pension", 18)); // 年金 月額

  // 住まい
  const [housingType, setHousingType] = useState(S("housingType", "rent"));
  const [rent, setRent] = useState(S("rent", 10));
  const [repay, setRepay] = useState(S("repay", 9));
  const [remainYears, setRemainYears] = useState(S("remainYears", 25));
  const [buyAge, setBuyAge] = useState(S("buyAge", 40));
  const [downPay, setDownPay] = useState(S("downPay", 500));

  // 資産・運用
  const [assets, setAssets] = useState(S("assets", 500));
  const [rate, setRate] = useState(S("rate", 3));

  // FP視点の前提（詳細設定）
  const [inflation, setInflation] = useState(S("inflation", 1.5)); // インフレ率（%/年）
  const [retireBonus, setRetireBonus] = useState(S("retireBonus", 1000)); // 退職金（万・一時金）
  const [bigSpend, setBigSpend] = useState(S("bigSpend", 150)); // 大型支出 1回あたり（万）
  const [bigSpendEvery, setBigSpendEvery] = useState(S("bigSpendEvery", 7)); // 大型支出のペース（年ごと）
  const [incomeDropAge, setIncomeDropAge] = useState(S("incomeDropAge", 65)); // 片方の収入が下がる年齢
  const [incomeAfter, setIncomeAfter] = useState(S("incomeAfter", 22)); // その後の世帯手取り月収（万）

  // 子ども
  const [eduPlan, setEduPlan] = useState(S("eduPlan", "公立中心"));
  const [kids, setKids] = useState(S("kids", [6, 3]));
  const setKid = (i, v) => setKids((k) => k.map((x, idx) => (idx === i ? v : x)));
  const addKid = () => setKids((k) => (k.length < 3 ? [...k, 0] : k));
  const removeKid = (i) => setKids((k) => k.filter((_, idx) => idx !== i));

  // ★ 改善レバー（万円/月）
  const [cutM, setCutM] = useState(S("cutM", 0)); // 固定費の見直し
  const [upM, setUpM] = useState(S("upM", 0)); // 収入アップ
  const [memoryM, setMemoryM] = useState(S("memoryM", 0)); // 思い出につかう（Die With Zero）

  // ── 入力値をこの端末のブラウザに自動保存 ──
  useEffect(() => {
    const data = {
      age, retireAge, endAge, incomeM, bonus, livingM, pension,
      housingType, rent, repay, remainYears, buyAge, downPay,
      assets, rate, inflation, retireBonus, bigSpend, bigSpendEvery,
      incomeDropAge, incomeAfter, eduPlan, kids, cutM, upM, memoryM,
    };
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch (e) {}
  }, [
    age, retireAge, endAge, incomeM, bonus, livingM, pension,
    housingType, rent, repay, remainYears, buyAge, downPay,
    assets, rate, inflation, retireBonus, bigSpend, bigSpendEvery,
    incomeDropAge, incomeAfter, eduPlan, kids, cutM, upM, memoryM,
  ]);

  const resetAll = () => {
    if (window.confirm("入力した内容をすべて消して、最初の状態に戻します。よろしいですか？")) {
      try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
      window.location.reload();
    }
  };

  // ── シミュレーション本体 ──
  const run = (cut, up, mem = 0) => {
    const rows = [];
    let bal = assets;
    let bottom = { age, bal: Infinity };
    let depletedAt = null;

    for (let a = age; a <= endAge; a++) {
      const t = a - age;
      // 物価上昇率：t年後の生活費・教育費・家賃をふくらませる係数
      const infl = Math.pow(1 + inflation / 100, t);

      // 収入：リタイア後は年金（リタイア年だけ退職金を一時金で加算）。
      // 「収入が下がる年齢」以降は、世帯手取りを incomeAfter に切り替える。
      let income;
      if (a >= retireAge) {
        income = pension * 12 + (a === retireAge ? retireBonus : 0);
      } else if (a >= incomeDropAge) {
        income = (incomeAfter + up) * 12;
      } else {
        income = (incomeM + up) * 12 + bonus;
      }

      let housing = 0;
      let oneOff = 0;
      if (housingType === "rent") housing = rent * 12 * infl;
      else if (housingType === "loan")
        housing = t < remainYears ? repay * 12 : 0; // ローン返済は固定額（物価で変わらない）
      else {
        if (a < buyAge) housing = rent * 12 * infl;
        else {
          if (a === buyAge) oneOff = downPay;
          housing = a - buyAge < remainYears ? repay * 12 : 0;
        }
      }

      let edu = 0;
      kids.forEach((k0) => (edu += eduCostForAge(k0 + t, eduPlan)));
      edu *= infl;

      // 大型支出（車の買い替え・住宅修繕・家電など）を数年ごとに計上
      if (bigSpend > 0 && bigSpendEvery > 0 && t > 0 && t % bigSpendEvery === 0)
        oneOff += bigSpend * infl;

      const memSpend = a < retireAge ? mem * 12 * infl : 0;
      const expense =
        Math.max(0, (livingM - cut) * 12) * infl + memSpend + housing + edu + oneOff;
      const flow = income - expense;
      // 利回りは「貯金・投資のプラス残高」にだけ掛ける。
      // 残高がマイナス（赤字）のときに利回りを掛けると、借金が利回りで
      // 膨らんでしまい実態より悪く見えるため、マイナス時は運用しない。
      bal = (bal > 0 ? bal * (1 + rate / 100) : bal) + flow;

      if (bal < bottom.bal) bottom = { age: a, bal };
      if (bal < 0 && depletedAt === null) depletedAt = a;
      rows.push({ age: a, bal: Math.round(bal), income: Math.round(income), expense: Math.round(expense), edu: Math.round(edu), flow: Math.round(flow) });
    }
    const atRetire = rows.find((r) => r.age === retireAge)?.bal ?? null;
    return { rows, bottom, depletedAt, atRetire };
  };

  const base = useMemo(
    () => run(0, 0),
    // eslint-disable-next-line react-hooks/exhaustive-deps
    [age, retireAge, endAge, incomeM, bonus, livingM, pension, housingType, rent, repay, remainYears, buyAge, downPay, assets, rate, eduPlan, kids, inflation, retireBonus, bigSpend, bigSpendEvery, incomeDropAge, incomeAfter]
  );
  const improved = useMemo(
    () => run(cutM, upM, memoryM),
    // eslint-disable-next-line react-hooks/exhaustive-deps
    [cutM, upM, memoryM, age, retireAge, endAge, incomeM, bonus, livingM, pension, housingType, rent, repay, remainYears, buyAge, downPay, assets, rate, eduPlan, kids, inflation, retireBonus, bigSpend, bigSpendEvery, incomeDropAge, incomeAfter]
  );

  const hasLever = cutM > 0 || upM > 0 || memoryM > 0;
  const view = hasLever ? improved : base;
  const ok = view.depletedAt === null;
  const diffAtRetire =
    improved.atRetire !== null && base.atRetire !== null
      ? improved.atRetire - base.atRetire
      : 0;
  // Die With Zero：最後に残るお金と、家族の時間の残り
  const finalBal = view.rows[view.rows.length - 1]?.bal ?? 0;
  const kidTimes = kids
    .map((k, i) => ({ n: i + 1, left: 18 - k }))
    .filter((x) => x.left > 0);

  const chartData = base.rows.map((r, i) => ({
    age: r.age,
    いまのまま: r.bal,
    見直し後: improved.rows[i]?.bal,
  }));

  // 底をつく「理由」を、その年齢の中身に合わせて出し分ける
  const depRow = view.rows.find((r) => r.age === view.depletedAt);
  const depReason =
    view.depletedAt >= retireAge
      ? "リタイア後に年金だけでは暮らしを支えきれず、"
      : depRow && depRow.edu > 0
      ? "教育費が重なる時期に一度"
      : "一度";

  const summary = ok
    ? hasLever
      ? `この使い方でも、${endAge}歳まで貯金がもちそうです。リタイア時は${fmtMan(improved.atRetire ?? 0)}（いまのままと比べて${diffAtRetire >= 0 ? "＋" : "−"}${fmtMan(Math.abs(diffAtRetire))}）。数字で確かめてから使うお金に、罪悪感はいりません。`
      : `このペースなら、大きく崩れることなく${endAge}歳まで貯金を保てそうです。いちばん薄くなるのは${view.bottom.age}歳ごろ。そこさえ知っておけば、慌てなくて大丈夫。`
    : `${view.depletedAt}歳ごろ、${depReason}貯金が底をつく見込みです。でも今それが見えたことが、いちばんの収穫。下のレバーを動かすと、どれくらいで変わるか試せます。`;

  return (
    <div className="min-h-screen w-full" style={{ background: C.cream, color: C.ink }}>
      <style>{`
        * { font-family: "Zen Maru Gothic","Hiragino Maru Gothic ProN","Hiragino Sans",system-ui,sans-serif; }
        input[type=range] { accent-color: ${C.sage}; height: 28px; }
      `}</style>

      <div className="mx-auto max-w-5xl px-4 py-6 sm:px-6 sm:py-10">
        {/* ヘッダー */}
        <header className="mb-6 text-center sm:mb-8">
          <p className="mb-1 text-xs font-bold tracking-widest" style={{ color: C.coral }}>
            こわくない、わが家のお金の地図
          </p>
          <h1 className="text-[22px] font-black leading-snug sm:text-3xl" style={{ color: C.ink }}>
            ライフプラン シミュレーター
          </h1>
          <p className="mx-auto mt-2 max-w-md text-[13px] leading-relaxed" style={{ color: C.sub }}>
            ＋と−をポチポチするだけ。これからの貯金の流れと、「見直したらどう変わるか」まで見えます。
          </p>
          <p className="mt-2 text-[11px]" style={{ color: C.sub }}>
            ✓ 入力した内容はこの端末に自動保存されます
            <button onClick={resetAll} className="ml-2 underline" style={{ color: C.coral }}>
              リセット
            </button>
          </p>
        </header>

        <div className="grid gap-4 sm:gap-5 lg:grid-cols-[minmax(0,340px)_1fr]">
          {/* ── 入力 ── */}
          <div className="space-y-4">
            <Card icon="🏠" title="わが家のきほん">
              <Stepper label="あなたの年齢" value={age} onChange={setAge} unit="歳" min={20} max={70} hint="夫婦で歳が違うときは、収入が多い方の年齢でOK" />
              <Stepper label="手取り月収（世帯）" value={incomeM} onChange={setIncomeM} unit="万" step={1} hint="夫婦合算でOK。だいたいで大丈夫です" />
              <Stepper label="ボーナス（年間・手取り）" value={bonus} onChange={setBonus} unit="万" step={10} />
              <Stepper label="月の生活費" value={livingM} onChange={setLivingM} unit="万" step={1} hint="家賃・ローン・教育費はのぞく" />
              <Stepper label="いまの貯金・投資の合計" value={assets} onChange={setAssets} unit="万" step={50} />
            </Card>

            <Card icon="🔑" title="住まい">
              <div className="mb-2 flex gap-1.5">
                {[["rent", "賃貸"], ["loan", "ローン中"], ["buy", "購入予定"]].map(([v, l]) => (
                  <Pill key={v} active={housingType === v} onClick={() => setHousingType(v)}>
                    {l}
                  </Pill>
                ))}
              </div>
              {housingType === "rent" && (
                <Stepper label="家賃（月）" value={rent} onChange={setRent} unit="万" step={0.5} />
              )}
              {housingType === "loan" && (
                <>
                  <Stepper label="返済額（月）" value={repay} onChange={setRepay} unit="万" step={0.5} />
                  <Stepper label="完済まであと" value={remainYears} onChange={setRemainYears} unit="年" />
                </>
              )}
              {housingType === "buy" && (
                <>
                  <Stepper label="いまの家賃（月）" value={rent} onChange={setRent} unit="万" step={0.5} />
                  <Stepper label="買う予定の年齢" value={buyAge} onChange={setBuyAge} unit="歳" />
                  <Stepper label="頭金" value={downPay} onChange={setDownPay} unit="万" step={50} />
                  <Stepper label="返済額（月）" value={repay} onChange={setRepay} unit="万" step={0.5} />
                  <Stepper label="返済年数" value={remainYears} onChange={setRemainYears} unit="年" />
                </>
              )}
            </Card>

            <Card icon="🎒" title="お子さんと教育費">
              <div className="mb-2 flex flex-wrap gap-1.5">
                {Object.keys(EDU).map((p) => (
                  <Pill key={p} active={eduPlan === p} onClick={() => setEduPlan(p)} color={C.honey}>
                    {p}
                  </Pill>
                ))}
              </div>
              {kids.map((k, i) => (
                <div key={i} className="flex items-center justify-between py-1">
                  <span className="text-sm font-medium">{i + 1}人目の年齢</span>
                  <div className="flex items-center gap-1">
                    <button onClick={() => setKid(i, Math.max(0, k - 1))} className="flex h-9 w-9 items-center justify-center rounded-full text-lg font-bold active:scale-95" style={{ background: C.coralSoft, color: C.coral }}>−</button>
                    <span className="flex items-baseline">
                      <input
                        type="number"
                        inputMode="numeric"
                        value={k}
                        onChange={(e) => setKid(i, Math.max(0, parseInt(e.target.value) || 0))}
                        onFocus={(e) => e.target.select()}
                        aria-label={`${i + 1}人目の年齢を直接入力`}
                        className="w-10 rounded-lg bg-transparent text-center text-base font-bold tabular-nums outline-none focus:ring-2"
                        style={{ color: C.ink, border: `1px dashed ${C.line}` }}
                      />
                      <span className="ml-0.5 text-xs font-medium" style={{ color: C.sub }}>歳</span>
                    </span>
                    <button onClick={() => setKid(i, k + 1)} className="flex h-9 w-9 items-center justify-center rounded-full text-lg font-bold active:scale-95" style={{ background: C.coralSoft, color: C.coral }}>＋</button>
                    <button onClick={() => removeKid(i)} className="ml-1 text-[11px]" style={{ color: C.sub }}>削除</button>
                  </div>
                </div>
              ))}
              {kids.length < 3 && (
                <button onClick={addKid} className="mt-1 text-xs font-bold" style={{ color: C.coral }}>
                  ＋ お子さんを追加
                </button>
              )}
              <p className="mt-2 text-[11px] leading-relaxed" style={{ color: C.sub }}>
                保育園〜大学までの平均的な費用が、年齢に合わせて自動で乗ります。
              </p>
            </Card>

            <details className="rounded-3xl px-4 py-3 sm:px-5" style={{ background: C.card, border: `1px solid ${C.line}` }}>
              <summary className="cursor-pointer text-[15px] font-bold" style={{ color: C.ink }}>
                ⚙️ 詳細設定（さわらなくてもOK）
              </summary>
              <div className="pt-1">
                <Stepper label="リタイア予定" value={retireAge} onChange={setRetireAge} unit="歳" min={55} max={75} />
                <Stepper label="何歳まで見る？" value={endAge} onChange={setEndAge} unit="歳" min={80} max={100} step={5} />
                <Stepper label="年金（月・世帯）" value={pension} onChange={setPension} unit="万" />
                <Stepper label="想定利回り" value={rate} onChange={setRate} unit="%" step={0.5} max={7} hint="NISAなど長期運用なら2〜3%が控えめな目安" />
                <Stepper label="インフレ率" value={inflation} onChange={setInflation} unit="%" step={0.5} max={5} hint="物価上昇。生活費・教育費が毎年これだけ上がる前提。控えめなら1〜2%" />
                <Stepper label="退職金（一時金）" value={retireBonus} onChange={setRetireBonus} unit="万" step={100} max={5000} hint="リタイア年に一度だけ入るお金。なければ0に" />
                <Stepper label="大型支出（1回）" value={bigSpend} onChange={setBigSpend} unit="万" step={50} max={2000} hint="車の買い替え・住宅修繕・家電などのまとまった出費" />
                <Stepper label="大型支出のペース" value={bigSpendEvery} onChange={setBigSpendEvery} unit="年ごと" step={1} min={1} max={20} hint="上の支出を何年ごとに見込むか" />
                <Stepper label="収入が下がる年齢" value={incomeDropAge} onChange={setIncomeDropAge} unit="歳" min={age} max={retireAge} hint="片方が仕事をやめる等。下げないならリタイア年齢と同じに" />
                <Stepper label="その後の世帯手取り（月）" value={incomeAfter} onChange={setIncomeAfter} unit="万" step={1} hint="収入が下がったあとの世帯の手取り月収" />
              </div>
            </details>
          </div>

          {/* ── 結果 ── */}
          <div className="space-y-4">
            {/* あんしんメッセージ */}
            <div
              className="rounded-3xl p-4 sm:p-5"
              style={{
                background: ok ? C.sageSoft : "#FAEDE9",
                border: `1.5px solid ${ok ? C.sage : C.alert}`,
              }}
            >
              <p className="mb-1 text-xs font-black" style={{ color: ok ? C.sage : C.alert }}>
                {ok ? "🌱 だいじょうぶ、土台はできています" : "💡 見直しどきが見つかりました"}
              </p>
              <p className="text-[14px] leading-relaxed">{summary}</p>
            </div>

            {/* ★ 見直しレバー */}
            <Card icon="✨" title="未来を動かすレバー">
              <div className="space-y-3 pt-1">
                <div>
                  <div className="flex items-baseline justify-between">
                    <span className="text-sm font-medium">固定費を見直す（保険・通信・サブスク）</span>
                    <span className="text-base font-black tabular-nums" style={{ color: C.sage }}>
                      月 −{yenFromMan(cutM)}円
                    </span>
                  </div>
                  <input
                    type="range"
                    min={0}
                    max={3}
                    step={0.1}
                    value={cutM}
                    onChange={(e) => setCutM(parseFloat(e.target.value))}
                    className="w-full"
                    aria-label="固定費の見直し額"
                  />
                </div>
                <div>
                  <div className="flex items-baseline justify-between">
                    <span className="text-sm font-medium">収入をふやす（働き方・副収入）</span>
                    <span className="text-base font-black tabular-nums" style={{ color: C.sage }}>
                      月 ＋{yenFromMan(upM)}円
                    </span>
                  </div>
                  <input
                    type="range"
                    min={0}
                    max={5}
                    step={0.1}
                    value={upM}
                    onChange={(e) => setUpM(parseFloat(e.target.value))}
                    className="w-full"
                    aria-label="収入アップ額"
                  />
                </div>
                <div>
                  <div className="flex items-baseline justify-between">
                    <span className="text-sm font-medium">思い出につかう（旅行・体験・帰省）</span>
                    <span className="text-base font-black tabular-nums" style={{ color: C.honey }}>
                      月 ＋{yenFromMan(memoryM)}円
                    </span>
                  </div>
                  <input
                    type="range"
                    min={0}
                    max={10}
                    step={0.1}
                    value={memoryM}
                    onChange={(e) => setMemoryM(parseFloat(e.target.value))}
                    className="w-full"
                    style={{ accentColor: C.honey }}
                    aria-label="思い出に使う額"
                  />
                  <p className="text-[11px]" style={{ color: C.sub }}>
                    「使っても大丈夫？」を数字で確かめるレバー。リタイアまでの間、毎月この額を経験に回した場合です。
                  </p>
                </div>
                {hasLever && (
                  <div
                    className="rounded-2xl px-4 py-3 text-center"
                    style={{ background: improved.depletedAt === null ? C.sageSoft : "#FAEDE9" }}
                  >
                    <p
                      className="text-xs font-bold"
                      style={{ color: improved.depletedAt === null ? C.sage : C.alert }}
                    >
                      この使い方だと、{retireAge}歳のときの貯金は
                    </p>
                    <p
                      className="text-2xl font-black tabular-nums"
                      style={{ color: improved.depletedAt === null ? C.sage : C.alert }}
                    >
                      {fmtMan(improved.atRetire ?? 0)}
                      <span className="ml-1 text-sm">
                        （{diffAtRetire >= 0 ? "＋" : "−"}{fmtMan(Math.abs(diffAtRetire))}）
                      </span>
                    </p>
                    {memoryM > 0 && improved.depletedAt === null && (
                      <p className="mt-1 text-[11px] font-bold" style={{ color: C.sub }}>
                        月{yenFromMan(memoryM)}円を思い出に使っても、{endAge}歳まで貯金はもちます
                      </p>
                    )}
                    {improved.depletedAt !== null && (
                      <p className="mt-1 text-[11px] font-bold" style={{ color: C.alert }}>
                        {improved.depletedAt}歳ごろに一度底をつく見込み。少しだけ調整してみてください
                      </p>
                    )}
                  </div>
                )}
              </div>
            </Card>

            {/* グラフ */}
            <Card icon="📈" title="貯金の流れ">
              <div style={{ width: "100%", height: 250 }}>
                <ResponsiveContainer>
                  <ComposedChart data={chartData} margin={{ top: 8, right: 4, left: 0, bottom: 0 }}>
                    <defs>
                      <linearGradient id="aft" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor={C.sage} stopOpacity={0.3} />
                        <stop offset="100%" stopColor={C.sage} stopOpacity={0.02} />
                      </linearGradient>
                    </defs>
                    <CartesianGrid stroke={C.line} vertical={false} />
                    <XAxis dataKey="age" tick={{ fontSize: 10, fill: C.sub }} tickLine={false} axisLine={{ stroke: C.line }} interval="preserveStartEnd" minTickGap={30} tickFormatter={(v) => `${v}歳`} />
                    <YAxis tick={{ fontSize: 10, fill: C.sub }} tickLine={false} axisLine={false} width={42} tickFormatter={(v) => (Math.abs(v) >= 10000 ? `${+(v / 10000).toFixed(1)}億` : v.toLocaleString("ja-JP"))} />
                    <Tooltip
                      formatter={(v, name) => [`${fmtMan(v)}円`, name]}
                      labelFormatter={(l) => `${l}歳のとき`}
                      contentStyle={{ borderRadius: 14, border: `1px solid ${C.line}`, fontSize: 12, fontWeight: 700 }}
                    />
                    <ReferenceLine y={0} stroke={C.alert} strokeDasharray="3 3" />
                    <ReferenceLine x={retireAge} stroke={C.sub} strokeDasharray="2 4" label={{ value: "リタイア", fontSize: 10, fill: C.sub, position: "top" }} />
                    <Area type="monotone" dataKey={hasLever ? "見直し後" : "いまのまま"} stroke="none" fill="url(#aft)" />
                    <Line type="monotone" dataKey="いまのまま" stroke={hasLever ? C.sub : C.coral} strokeWidth={hasLever ? 1.5 : 2.5} strokeDasharray={hasLever ? "4 4" : "0"} dot={false} />
                    {hasLever && (
                      <Line type="monotone" dataKey="見直し後" stroke={C.sage} strokeWidth={2.5} dot={false} />
                    )}
                  </ComposedChart>
                </ResponsiveContainer>
              </div>
              {hasLever && (
                <p className="mt-1 text-center text-[11px] font-bold" style={{ color: C.sub }}>
                  <span style={{ color: C.sub }}>- - いまのまま</span>
                  <span style={{ color: C.sage }}>━ 見直し後</span>
                </p>
              )}
            </Card>

            {/* ポイント3つ */}
            <div className="grid grid-cols-1 gap-2 sm:grid-cols-3">
              {[
                { k: "リタイア時の貯金", v: view.atRetire, c: C.ink },
                { k: "いちばん薄くなる時期", v: view.bottom.bal, c: view.bottom.bal < 0 ? C.alert : C.sage, sub: `${view.bottom.age}歳ごろ` },
                {
                  k: "教育費がピークの年",
                  v: Math.max(...view.rows.map((r) => r.edu)),
                  c: C.honey,
                  sub: `${view.rows.reduce((m, r) => (r.edu > m.edu ? r : m), view.rows[0]).age}歳ごろ`,
                },
              ].map((x) => (
                <div key={x.k} className="flex items-baseline justify-between gap-2 rounded-2xl px-4 py-3 sm:block sm:p-4" style={{ background: C.card, border: `1px solid ${C.line}` }}>
                  <p className="text-xs" style={{ color: C.sub }}>
                    {x.k}
                    {x.sub && <span className="ml-1 sm:hidden">（{x.sub}）</span>}
                  </p>
                  <p className="text-lg font-black tabular-nums sm:mt-1" style={{ color: x.c }}>
                    {fmtMan(x.v ?? 0)}
                  </p>
                  {x.sub && <p className="hidden text-[11px] sm:block" style={{ color: C.sub }}>{x.sub}</p>}
                </div>
              ))}
            </div>

            {/* Die With Zero の視点 */}
            <Card icon="🎈" title="つかいきる、という視点">
              <p className="text-[13px] leading-relaxed">
                このままだと、{endAge}歳の時点で
                <span className="mx-1 text-xl font-black tabular-nums" style={{ color: C.coral }}>
                  {fmtMan(finalBal)}
                </span>
                {finalBal >= 0 ? "残る見込みです。" : "足りない見込みです。"}
              </p>
              {finalBal > 1000 && (
                <p className="mt-2 text-[13px] leading-relaxed">
                  残ったお金は、言いかえると「使えたのに使わなかった経験」です。思い出は若いうちに作るほど、長く何度も配当をくれます。上のレバーの「思い出につかう」を動かして、どこまで使っても大丈夫かを確かめてみてください。貯めるのが目的じゃなく、安心して使えるようになるのが目的です。
                </p>
              )}
              {kidTimes.length > 0 && (
                <div className="mt-3 rounded-2xl px-4 py-3" style={{ background: C.coralSoft }}>
                  <p className="mb-1 text-xs font-black" style={{ color: C.coral }}>
                    ⏳ 家族の時間にも、じつは期限があります
                  </p>
                  {kidTimes.map((x) => (
                    <p key={x.n} className="text-[13px] font-bold leading-relaxed">
                      {x.n}人目と家族旅行に行ける夏休みは、あと{x.left}回
                    </p>
                  ))}
                  <p className="mt-1 text-[11px]" style={{ color: C.sub }}>
                    お金はあとから増やせても、この回数だけは増やせません。
                  </p>
                </div>
              )}
            </Card>

            {/* きょうの1歩 */}
            <div className="rounded-3xl p-4 text-center sm:p-5" style={{ background: C.coralSoft, border: `1.5px solid ${C.coral}` }}>
              <p className="text-xs font-black" style={{ color: C.coral }}>
                🍀 きょうの1歩
              </p>
              <p className="mt-1 text-[14px] font-bold leading-relaxed">
                {ok
                  ? "数字より先に、順番。まずはスマホ料金か保険、どちらか1つだけ明細を開いてみる。それで十分です。"
                  : "焦らなくて大丈夫。固定費の中でいちばん大きいもの（保険か住居）を1つ、今週だけ見直してみる。レバーで試した金額が、現実の目標になります。"}
              </p>
            </div>

            <p className="px-1 text-[11px] leading-relaxed" style={{ color: C.sub }}>
              ※ 教育費・利回り・インフレ率は平均的な目安です。大型支出（車の買い替え・住宅の修繕など）はざっくりの見込みで計上しており、介護費用までは含めていません。ここで見えた「気になるところ」を、面談で一緒に詰めていきましょう。
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<LifePlanSimulator />);
  </script>
</body>
</html>
