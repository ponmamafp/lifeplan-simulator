  <script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect } = React;
const {

// ───────────────────────────────────────────────
// データ保存（この端末のブラウザに自動保存）
// ───────────────────────────────────────────────
const SAVE_KEY = "lifeplan_v1";
const saved = (() => {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)) || {}; }
  catch (e) { return {}; }
})();
const S = (key, def) => (saved[key] !== undefined ? saved[key] : def);

// ───────────────────────────────────────────────
// カラーパレット：あたたかいクリーム × コーラル × セージ
// ───────────────────────────────────────────────
const C = {
  ink: "#4A4039", // 文字（こげ茶）
  coral: "#E08576", // メイン（コーラルピンク）
  coralSoft: "#FBEAE6",
  sage: "#7FA88B", // 改善後・プラス（セージグリーン)
  sageSoft: "#EDF4EF",
  honey: "#E8B04B", // アクセント（はちみつ）
  alert: "#D6705F",
  cream: "#FBF7F1", // 背景
  card: "#FFFFFF",
  line: "#EFE7DC",
  sub: "#9C8F85",
};

// 教育費の年額目安（万円）— 文科省「令和5年度 子供の学習費調査」等が出典。
// 幼〜高は学習費総額（塾・習い事を含む）、大学は国公立=授業料＋諸経費／私立は文系・理系の中間。
// 面談時に調整する前提のたたき台。
const EDU = {
  公立中心: { pre: 19, elem: 37, jhs: 54, hs: 60, uni: 67 },
  高校から私立: { pre: 19, elem: 37, jhs: 54, hs: 118, uni: 118 },
  私立多め: { pre: 35, elem: 174, jhs: 156, hs: 118, uni: 118 },
};

// 就業区分のラベル
const JOBS_SELF = { 会社員: "会社員・公務員", 自営: "自営・フリー", パート: "パート" };
const JOBS_SPOUSE = { 会社員: "会社員・公務員", 自営: "自営・フリー", パート: "パート", 専業: "専業主婦・主夫" };

// 1人あたりの年金（月）目安：基礎年金(満額約7万)＋厚生年金分（会社員のみ収入に応じて）。
// 自営・専業は国民年金（基礎）のみ＝約7万。あくまでざっくり目安。
function pensionForPerson(job, incomeM) {
  if (job === "専業" || job === "自営") return 7;
  if (job === "パート") return Math.min(10, Math.round(7 + incomeM * 0.12));
  return Math.min(17, Math.round(7 + incomeM * 0.26)); // 会社員・公務員
}

function eduCostForAge(childAge, plan) {
  const e = EDU[plan];
  if (childAge < 0) return 0;
  if (childAge <= 5) return e.pre;
  if (childAge <= 11) return e.elem;
  if (childAge <= 14) return e.jhs;
  if (childAge <= 17) return e.hs;
  if (childAge <= 21) return e.uni;
  return 0;
}

const man = (v) =>
  (v < 0 ? "−" : "") + Math.abs(Math.round(v)).toLocaleString("ja-JP");
const yenFromMan = (v) => Math.round(v * 10000).toLocaleString("ja-JP");
// 億超えは「1億2,340万」の形で表示
const fmtMan = (v) => {
  const n = Math.round(v);
  const neg = n < 0 ? "−" : "";
  const a = Math.abs(n);
  if (a >= 10000) {
    const oku = Math.floor(a / 10000);
    const rest = a % 10000;
    return rest > 0
      ? `${neg}${oku.toLocaleString("ja-JP")}億${rest.toLocaleString("ja-JP")}万`
      : `${neg}${oku.toLocaleString("ja-JP")}億`;
  }
  return `${neg}${a.toLocaleString("ja-JP")}万`;
};

// ───────────────────────────────────────────────
// ＋/−ステッパー（スマホで指1本で操作できる）
// ───────────────────────────────────────────────
function Stepper({ label, value, onChange, step = 1, min = 0, max = 9999, unit, hint }) {
  // 入力中は手で打った文字をそのまま保持（編集バッファ）。
  // スマホで数値欄の全選択が効かず「03000」のように先頭ゼロが付く不具合を防ぐため、
  // type="text" にして先頭の余分なゼロを取り除く。
  const [editing, setEditing] = useState(false);
  const [text, setText] = useState("");
  const clamp = (v) => Math.min(max, Math.max(min, v));
  const dec = () => onChange(clamp(+(value - step).toFixed(2)));
  const inc = () => onChange(clamp(+(value + step).toFixed(2)));
  const handleChange = (e) => {
    // 数字・マイナス・小数点だけ許可し、先頭の余分なゼロ（03000→3000）を除去
    let raw = e.target.value.replace(/[^0-9.-]/g, "").replace(/^(-?)0+(?=\d)/, "$1");
    setText(raw);
    const v = parseFloat(raw);
    if (!isNaN(v)) onChange(clamp(v));
  };
  const handleBlur = () => {
    setEditing(false);
    const v = parseFloat(text);
    onChange(isNaN(v) ? clamp(0) : clamp(v));
  };
  return (
    <div className="py-2">
      <div className="flex items-center justify-between gap-2">
        <span className="text-sm font-medium" style={{ color: C.ink }}>
          {label}
        </span>
        <div className="flex items-center gap-1">
          <button
            onClick={dec}
            aria-label={`${label}を減らす`}
            className="flex h-9 w-9 items-center justify-center rounded-full text-lg font-bold active:scale-95"
            style={{ background: C.coralSoft, color: C.coral }}
          >
            −
          </button>
          <span className="flex w-[5rem] items-baseline justify-center">
            <input
              type="text"
              inputMode="decimal"
              value={editing ? text : String(value)}
              onChange={handleChange}
              onFocus={(e) => { setEditing(true); setText(String(value)); e.target.select(); }}
              onBlur={handleBlur}
              aria-label={`${label}を直接入力`}
              className="w-12 rounded-lg bg-transparent text-center text-base font-bold tabular-nums outline-none focus:ring-2"
              style={{ color: C.ink, border: `1px dashed ${C.line}` }}
            />
            <span className="ml-0.5 text-xs font-medium" style={{ color: C.sub }}>
              {unit}
            </span>
          </span>
          <button
            onClick={inc}
            aria-label={`${label}を増やす`}
            className="flex h-9 w-9 items-center justify-center rounded-full text-lg font-bold active:scale-95"
            style={{ background: C.coralSoft, color: C.coral }}
          >
            ＋
          </button>
        </div>
      </div>
      {hint && (
        <p className="mt-0.5 text-[11px]" style={{ color: C.sub }}>
          {hint}
        </p>
      )}
    </div>
  );
}

function Pill({ active, onClick, children, color = C.coral }) {
  return (
    <button
      onClick={onClick}
      className="rounded-full px-3.5 py-1.5 text-xs font-bold transition active:scale-95"
      style={{
        background: active ? color : C.card,
        color: active ? "#fff" : C.sub,
        border: `1.5px solid ${active ? color : C.line}`,
      }}
    >
      {children}
    </button>
  );
}

function Card({ icon, title, children }) {
  return (
    <section
      className="rounded-3xl p-4 sm:p-5"
      style={{ background: C.card, border: `1px solid ${C.line}` }}
    >
      <h3
        className="mb-1.5 flex items-center gap-2 text-[15px] font-bold"
        style={{ color: C.ink }}
      >
        <span aria-hidden>{icon}</span>
        {title}
      </h3>
      {children}
    </section>
  );
}

// ───────────────────────────────────────────────
// 本体
// ───────────────────────────────────────────────
function LifePlanSimulator() {
  // 基本（月ベースで入力）
  const [age, setAge] = useState(S("age", 38)); // 本人の年齢
  const [retireAge, setRetireAge] = useState(S("retireAge", 65)); // 本人のリタイア年齢
  const [endAge, setEndAge] = useState(S("endAge", 95));
  const [incomeM, setIncomeM] = useState(S("incomeM", 38)); // 本人の手取り月収（万）
  const [jobSelf, setJobSelf] = useState(S("jobSelf", "会社員")); // 本人の就業区分
  const [bonus, setBonus] = useState(S("bonus", 80)); // ボーナス（年・万・世帯）
  const [livingM, setLivingM] = useState(S("livingM", 20)); // 月の生活費（住居・教育のぞく）
  const [livingRetireM, setLivingRetireM] = useState(S("livingRetireM", 20)); // リタイア後の月の生活費

  // 配偶者（分けて入力）
  const [hasSpouse, setHasSpouse] = useState(S("hasSpouse", true));
  const [ageSpouse, setAgeSpouse] = useState(S("ageSpouse", 38)); // 配偶者の年齢
  const [incomeSpouseM, setIncomeSpouseM] = useState(S("incomeSpouseM", 0)); // 配偶者の手取り月収
  const [jobSpouse, setJobSpouse] = useState(S("jobSpouse", "専業")); // 配偶者の就業区分
  const [retireSpouse, setRetireSpouse] = useState(S("retireSpouse", 65)); // 配偶者のリタイア年齢

  // 年金
  const [pension, setPension] = useState(S("pension", 23)); // 年金 月額・世帯（手入力の値）
  const [pensionAuto, setPensionAuto] = useState(S("pensionAuto", true)); // 収入から自動推定するか

  // 住まい
  const [housingType, setHousingType] = useState(S("housingType", "rent"));
  const [rent, setRent] = useState(S("rent", 10));
  const [repay, setRepay] = useState(S("repay", 9));
  const [remainYears, setRemainYears] = useState(S("remainYears", 25));
  const [buyAge, setBuyAge] = useState(S("buyAge", 40));
  const [downPay, setDownPay] = useState(S("downPay", 500));

  // 資産・運用
  const [assets, setAssets] = useState(S("assets", 500));
  const [rate, setRate] = useState(S("rate", 3));

  // FP視点の前提（詳細設定）
  const [inflation, setInflation] = useState(S("inflation", 1.5)); // インフレ率（%/年）
  const [raiseRate, setRaiseRate] = useState(S("raiseRate", 1.5)); // 昇給率（%/年・現役の収入が毎年増える）
  const [retireBonus, setRetireBonus] = useState(S("retireBonus", 1000)); // 退職金（万・一時金）
  const [bigSpend, setBigSpend] = useState(S("bigSpend", 120)); // 大型支出 1回あたり（万）
  const [bigSpendEvery, setBigSpendEvery] = useState(S("bigSpendEvery", 10)); // 大型支出のペース（年ごと）

  // 子ども（各子に教育プランを持たせる。未来の子は born:false ＝「あと value 年で誕生」）
  // 旧データ（[6, 3] のような数値配列）からの移行もここで吸収する
  const migrateKids = (arr) =>
    (arr || []).map((k) =>
      typeof k === "number"
        ? { plan: "公立中心", born: true, value: k }
        : { plan: k.plan || "公立中心", born: k.born !== false, value: k.value ?? 0 }
    );
  const [kids, setKids] = useState(
    migrateKids(
      S("kids", [
        { plan: "公立中心", born: true, value: 6 },
        { plan: "公立中心", born: true, value: 3 },
      ])
    )
  );
  // 子の「いまの年齢」。未来の子はマイナス（あと value 年で誕生 → 現在 -value 歳）
  const kidAge = (k) => (k.born ? k.value : -k.value);
  // これからかかる教育費の目安（万・物価上昇は含めないざっくり値）
  const eduRemain = (k) => {
    let sum = 0;
    for (let a2 = Math.max(0, kidAge(k)); a2 <= 21; a2++) sum += eduCostForAge(a2, k.plan);
    return sum;
  };
  const eduTotalAll = kids.reduce((s, k) => s + eduRemain(k), 0);
  const setKidField = (i, field, val) =>
    setKids((ks) => ks.map((k, idx) => (idx === i ? { ...k, [field]: val } : k)));
  const addKid = () =>
    setKids((k) => (k.length < 5 ? [...k, { plan: "公立中心", born: true, value: 0 }] : k));
  const removeKid = (i) => setKids((k) => k.filter((_, idx) => idx !== i));

  // ★ 改善レバー（万円/月）
  const [cutM, setCutM] = useState(S("cutM", 0)); // 固定費の見直し
  const [upM, setUpM] = useState(S("upM", 0)); // 収入アップ
  const [memoryM, setMemoryM] = useState(S("memoryM", 0)); // 思い出につかう（Die With Zero）

  // 年金：本人＋配偶者をそれぞれ就業区分・収入から計算。手入力時は世帯合計をその比率で按分。
  let pSelfBase = pensionForPerson(jobSelf, incomeM);
  let pSpouseBase = hasSpouse ? pensionForPerson(jobSpouse, incomeSpouseM) : 0;
  const estPension = pSelfBase + pSpouseBase; // 自動推定の世帯合計（表示用）
  let pSelf = pSelfBase;
  let pSpouse = pSpouseBase;
  if (!pensionAuto) {
    const scale = estPension > 0 ? pension / estPension : 0.5;
    pSelf = pSelfBase * scale;
    pSpouse = pSpouseBase * scale;
  }

  // ── 入力値をこの端末のブラウザに自動保存 ──
  useEffect(() => {
    const data = {
      age, retireAge, endAge, incomeM, jobSelf, bonus, livingM, livingRetireM, pension, pensionAuto,
      hasSpouse, ageSpouse, incomeSpouseM, jobSpouse, retireSpouse,
      housingType, rent, repay, remainYears, buyAge, downPay,
      assets, rate, inflation, raiseRate, retireBonus, bigSpend, bigSpendEvery,
      kids, cutM, upM, memoryM,
    };
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch (e) {}
  }, [
    age, retireAge, endAge, incomeM, jobSelf, bonus, livingM, livingRetireM, pension, pensionAuto,
    hasSpouse, ageSpouse, incomeSpouseM, jobSpouse, retireSpouse,
    housingType, rent, repay, remainYears, buyAge, downPay,
    assets, rate, inflation, raiseRate, retireBonus, bigSpend, bigSpendEvery,
    kids, cutM, upM, memoryM,
  ]);

  const resetAll = () => {
    if (window.confirm("入力した内容をすべて消して、最初の状態に戻します。よろしいですか？")) {
      try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
      window.location.reload();
    }
  };

  // ── シミュレーション本体 ──
  const run = (cut, up, mem = 0) => {
    const rows = [];
    let bal = assets;
    let bottom = { age, bal: Infinity };
    let depletedAt = null;

    for (let a = age; a <= endAge; a++) {
      const t = a - age;
      // 物価上昇率：t年後の生活費・教育費・家賃をふくらませる係数
      const infl = Math.pow(1 + inflation / 100, t);

      // 収入：本人・配偶者それぞれ、リタイア前は給与（昇給率で増加）、後は年金。
      // 本人のリタイア年に退職金を一時金で加算。改善レバーupは本人の収入アップとして反映。
      const raise = Math.pow(1 + raiseRate / 100, t);
      let income = 0;
      // 本人
      if (a < retireAge) income += (incomeM * raise + up) * 12 + bonus * raise;
      else { income += pSelf * 12; if (a === retireAge) income += retireBonus; }
      // 配偶者
      if (hasSpouse) {
        const aSp = ageSpouse + t;
        if (aSp >= retireSpouse) income += pSpouse * 12;
        else if (jobSpouse !== "専業") income += incomeSpouseM * raise * 12;
      }

      let housing = 0;
      let oneOff = 0;
      if (housingType === "rent") housing = rent * 12 * infl;
      else if (housingType === "loan")
        housing = t < remainYears ? repay * 12 : 0; // ローン返済は固定額（物価で変わらない）
      else {
        if (a < buyAge) housing = rent * 12 * infl;
        else {
          if (a === buyAge) oneOff = downPay;
          housing = a - buyAge < remainYears ? repay * 12 : 0;
        }
      }

      let edu = 0;
      kids.forEach((k) => (edu += eduCostForAge(kidAge(k) + t, k.plan)));
      edu *= infl;

      // 大型支出（車の買い替え・住宅修繕・家電など）を数年ごとに計上
      if (bigSpend > 0 && bigSpendEvery > 0 && t > 0 && t % bigSpendEvery === 0)
        oneOff += bigSpend * infl;

      const memSpend = a < retireAge ? mem * 12 * infl : 0;
      // 生活費はリタイア前後で切り替える（退職後は下がる家庭が多い）
      const livingBase = a >= retireAge ? livingRetireM : livingM;
      const expense =
        Math.max(0, (livingBase - cut) * 12) * infl + memSpend + housing + edu + oneOff;
      const flow = income - expense;
      // 利回りは「貯金・投資のプラス残高」にだけ掛ける。
      // 残高がマイナス（赤字）のときに利回りを掛けると、借金が利回りで
      // 膨らんでしまい実態より悪く見えるため、マイナス時は運用しない。
      bal = (bal > 0 ? bal * (1 + rate / 100) : bal) + flow;

      if (bal < bottom.bal) bottom = { age: a, bal };
      if (bal < 0 && depletedAt === null) depletedAt = a;
      rows.push({ age: a, bal: Math.round(bal), income: Math.round(income), expense: Math.round(expense), edu: Math.round(edu), flow: Math.round(flow) });
    }
    const atRetire = rows.find((r) => r.age === retireAge)?.bal ?? null;
    return { rows, bottom, depletedAt, atRetire };
  };

  const base = useMemo(
    () => run(0, 0),
    // eslint-disable-next-line react-hooks/exhaustive-deps
    [age, retireAge, endAge, incomeM, jobSelf, bonus, livingM, livingRetireM, pension, pensionAuto, hasSpouse, ageSpouse, incomeSpouseM, jobSpouse, retireSpouse, housingType, rent, repay, remainYears, buyAge, downPay, assets, rate, kids, inflation, raiseRate, retireBonus, bigSpend, bigSpendEvery]
  );
  const improved = useMemo(
    () => run(cutM, upM, memoryM),
    // eslint-disable-next-line react-hooks/exhaustive-deps
    [cutM, upM, memoryM, age, retireAge, endAge, incomeM, jobSelf, bonus, livingM, livingRetireM, pension, pensionAuto, hasSpouse, ageSpouse, incomeSpouseM, jobSpouse, retireSpouse, housingType, rent, repay, remainYears, buyAge, downPay, assets, rate, kids, inflation, raiseRate, retireBonus, bigSpend, bigSpendEvery]
  );

  const hasLever = cutM > 0 || upM > 0 || memoryM > 0;
  const view = hasLever ? improved : base;
  const ok = view.depletedAt === null;
  const diffAtRetire =
    improved.atRetire !== null && base.atRetire !== null
      ? improved.atRetire - base.atRetire
      : 0;
  // Die With Zero：最後に残るお金と、家族の時間の残り
  const finalBal = view.rows[view.rows.length - 1]?.bal ?? 0;
  const kidTimes = kids
    .map((k, i) => ({ n: i + 1, left: 18 - kidAge(k) }))
    .filter((x) => x.left > 0);

  const chartData = base.rows.map((r, i) => ({
    age: r.age,
    いまのまま: r.bal,
    見直し後: improved.rows[i]?.bal,
    // ツールチップ用：表示中シナリオ（レバーありなら見直し後）の収支内訳
    収入: view.rows[i]?.income,
    支出: view.rows[i]?.expense,
    教育費: view.rows[i]?.edu,
    収支: view.rows[i]?.flow,
  }));

  // グラフのツールチップ：その歳の貯金＋収支内訳を表示
  const renderTip = ({ active, payload, label }) => {
    if (!active || !payload || !payload.length) return null;
    const d = payload[0].payload;
    return (
      <div style={{ background: "#fff", borderRadius: 14, border: `1px solid ${C.line}`, padding: "8px 11px", fontSize: 12, fontWeight: 700, color: C.ink, boxShadow: "0 4px 14px rgba(0,0,0,.08)" }}>
        <div style={{ marginBottom: 4 }}>{label}歳のとき</div>
        <div>貯金：{fmtMan(hasLever ? d.見直し後 : d.いまのまま)}円</div>
        <div style={{ color: C.sage }}>収入：{fmtMan(d.収入)}円/年</div>
        <div style={{ color: C.coral }}>支出：{fmtMan(d.支出)}円/年</div>
        {d.教育費 > 0 && (
          <div style={{ color: C.honey, fontSize: 11 }}>　うち教育費：{fmtMan(d.教育費)}円</div>
        )}
        <div style={{ color: d.収支 >= 0 ? C.sage : C.alert, marginTop: 2 }}>
          収支：{d.収支 >= 0 ? "＋" : "−"}{fmtMan(Math.abs(d.収支))}円/年
        </div>
      </div>
    );
  };

  // Y軸：マイナスが深すぎてプラスが潰れないよう、下限に「床」を設ける。
  // プラスのピークより深く沈むときは、下限をプラスのピークと同じ深さまでに抑える
  // （それ以上の落ち込みはグラフの外＝下に振り切れる。実際の深さは下のカードの数字で確認）。
  const allBals = chartData.flatMap((d) => [d.いまのまま, d.見直し後].filter((v) => typeof v === "number"));
  const maxPos = Math.max(0, ...allBals);
  const minBal = Math.min(0, ...allBals);
  const deepNeg = maxPos > 0 && minBal < -maxPos;
  const yFloor = deepNeg ? -Math.round(maxPos) : "dataMin";
  // 表示される範囲の大きさで単位（万/億）を統一して決める
  const displayMax = deepNeg ? maxPos : Math.max(maxPos, Math.abs(minBal));
  const yTickFmt = (v) =>
    v === 0 ? "0" : displayMax >= 10000 ? `${+(v / 10000).toFixed(1)}億` : v.toLocaleString("ja-JP");

  // 底をつく「理由」を、その年齢の中身に合わせて出し分ける。
  // 「教育費が重なる」は“2人以上が同時に在学”しているときだけ言う（1人や大学の終盤だけで
  // 「重なる」と誤表示しないため）。それ以外は原因を決めつけず中立表現にする。
  const depT = (view.depletedAt ?? age) - age;
  const eduKidsAtDep = kids.filter(
    (k) => eduCostForAge(kidAge(k) + depT, k.plan) > 0
  ).length;
  const depReason =
    view.depletedAt >= retireAge
      ? "リタイア後に年金だけでは暮らしを支えきれず、"
      : eduKidsAtDep >= 2
      ? "教育費が重なる時期に一度"
      : "一度";

  const summary = ok
    ? hasLever
      ? `この使い方でも、${endAge}歳まで貯金がもちそうです。リタイア時は${fmtMan(improved.atRetire ?? 0)}（いまのままと比べて${diffAtRetire >= 0 ? "＋" : "−"}${fmtMan(Math.abs(diffAtRetire))}）。数字で確かめてから使うお金に、罪悪感はいりません。`
      : `このペースなら、大きく崩れることなく${endAge}歳まで貯金を保てそうです。いちばん薄くなるのは${view.bottom.age}歳ごろ。そこさえ知っておけば、慌てなくて大丈夫。`
    : `${view.depletedAt}歳ごろ、${depReason}貯金が底をつく見込みです。でも今それが見えたことが、いちばんの収穫。下のレバーを動かすと、どれくらいで変わるか試せます。`;

  return (
    <div className="min-h-screen w-full" style={{ background: C.cream, color: C.ink }}>
      <style>{`
        * { font-family: "Zen Maru Gothic","Hiragino Maru Gothic ProN","Hiragino Sans",system-ui,sans-serif; }
        input[type=range] { accent-color: ${C.sage}; height: 28px; }
      `}</style>

      <div className="mx-auto max-w-5xl px-4 py-6 sm:px-6 sm:py-10">
        {/* ヘッダー */}
        <header className="mb-6 text-center sm:mb-8">
          <p className="mb-1 text-xs font-bold tracking-widest" style={{ color: C.coral }}>
            こわくない、わが家のお金の地図
          </p>
          <h1 className="text-[22px] font-black leading-snug sm:text-3xl" style={{ color: C.ink }}>
            ライフプラン シミュレーター
          </h1>
          <p className="mx-auto mt-2 max-w-md text-[13px] leading-relaxed" style={{ color: C.sub }}>
            ＋と−をポチポチするだけ。これからの貯金の流れと、「見直したらどう変わるか」まで見えます。
          </p>
          <p className="mt-2 text-[11px]" style={{ color: C.sub }}>
            ✓ 入力した内容はこの端末に自動保存されます
            <button onClick={resetAll} className="ml-2 underline" style={{ color: C.coral }}>
              リセット
            </button>
          </p>
        </header>

        <div className="grid gap-4 sm:gap-5 lg:grid-cols-[minmax(0,340px)_1fr]">
          {/* ── 入力 ── */}
          <div className="space-y-4">
            <Card icon="🏠" title="わが家のきほん">
              <Stepper label="あなたの年齢" value={age} onChange={setAge} unit="歳" min={20} max={70} />
              <Stepper label="あなたの手取り月収（月）" value={incomeM} onChange={setIncomeM} unit="万" step={1} hint="税・社保を引いた手取り。だいたいでOK" />
              <div className="py-1">
                <span className="text-sm font-medium" style={{ color: C.ink }}>あなたの働き方</span>
                <div className="mt-1 flex flex-wrap gap-1.5">
                  {Object.entries(JOBS_SELF).map(([k, v]) => (
                    <Pill key={k} active={jobSelf === k} onClick={() => setJobSelf(k)} color={C.sage}>{v}</Pill>
                  ))}
                </div>
              </div>

              {/* 配偶者（分けて入力） */}
              <div className="mt-1 pt-2" style={{ borderTop: `1px solid ${C.line}` }}>
                <div className="flex items-center justify-between">
                  <span className="text-sm font-medium" style={{ color: C.ink }}>配偶者・パートナー</span>
                  <div className="flex gap-1">
                    <Pill active={hasSpouse} onClick={() => setHasSpouse(true)}>いる</Pill>
                    <Pill active={!hasSpouse} onClick={() => setHasSpouse(false)}>いない</Pill>
                  </div>
                </div>
                {hasSpouse && (
                  <>
                    <Stepper label="配偶者の年齢" value={ageSpouse} onChange={setAgeSpouse} unit="歳" min={20} max={70} />
                    <div className="py-1">
                      <span className="text-sm font-medium" style={{ color: C.ink }}>配偶者の働き方</span>
                      <div className="mt-1 flex flex-wrap gap-1.5">
                        {Object.entries(JOBS_SPOUSE).map(([k, v]) => (
                          <Pill key={k} active={jobSpouse === k} onClick={() => setJobSpouse(k)} color={C.sage}>{v}</Pill>

                    {jobSpouse !== "専業" && (

              <Stepper label="ボーナス（年間・手取り・世帯）" value={bonus} onChange={setBonus} unit="万" step={10} />
              <Stepper label="月の生活費" value={livingM} onChange={setLivingM} unit="万" step={1} hint="家賃・ローン・教育費はのぞく" />
              <Stepper label="いまの貯金・投資の合計" value={assets} onChange={setAssets} unit="万" step={50} min={-99999} hint="借金のほうが多いときはマイナスでもOK（例：−200）" />

              {housingType === "loan" && (

            <Card icon="🎒" title="お子さんと教育費">

                    <div className="flex items-center gap-1">

                      <span className="flex items-baseline">
                        <input

                          aria-label={`${i + 1}人目の${k.born ? "年齢" : "誕生まで"}を直接入力`}

                        <span className="ml-0.5 text-xs font-medium" style={{ color: C.sub }}>{k.born ? "歳" : "年後"}</span>

                      <button onClick={() => setKidField(i, "value", k.value + 1)} className="flex h-9 w-9 items-center justify-center rounded-full text-lg font-bold active:scale-95" style={{ background: C.coralSoft, color: C.coral }}>＋</button>

                  {/* この子の教育プラン */}
                  <div className="mt-1.5 flex flex-wrap gap-1.5">
                    {Object.keys(EDU).map((p) => (
                      <Pill key={p} active={k.plan === p} onClick={() => setKidField(i, "plan", p)} color={C.honey}>
                        {p}
                      </Pill>
                    ))}
                  </div>

                  {/* この子の教育費の目安 */}
                  <p className="mt-1.5 text-[12px] font-bold" style={{ color: C.honey }}>

              {kids.length < 5 && (

                <span className="text-base font-black tabular-nums" style={{ color: C.honey }}>約 {fmtMan(eduTotalAll)}円</span>
              </div>

              <p className="mt-2 text-[11px] leading-relaxed" style={{ color: C.sub }}>
                幼稚園〜大学の平均費用（塾・習い事を含む／文科省 令和5年度）を、年齢に合わせて自動で乗せています。0〜2歳の保育料は別途。金額はプラン別のざっくり目安です。
              </p>
            </Card>

            <details className="rounded-3xl px-4 py-3 sm:px-5" style={{ background: C.card, border: `1px solid ${C.line}` }}>
              <summary className="cursor-pointer text-[15px] font-bold" style={{ color: C.ink }}>
                ⚙️ 詳細設定（さわらなくてもOK）
              </summary>
              <div className="pt-1">
                <Stepper label="あなたのリタイア予定" value={retireAge} onChange={setRetireAge} unit="歳" min={50} max={75} />
                {hasSpouse && (
                  <Stepper label="配偶者のリタイア予定" value={retireSpouse} onChange={setRetireSpouse} unit="歳" min={50} max={75} hint="片方だけ先に辞めるケースもここで" />
                )}
                <Stepper label="何歳まで見る？" value={endAge} onChange={setEndAge} unit="歳" min={80} max={100} step={5} />
                <div className="py-2">
                  <div className="flex items-center justify-between gap-2">
                    <span className="text-sm font-medium" style={{ color: C.ink }}>年金（月・世帯）</span>
                    <div className="flex gap-1">
                      <Pill active={pensionAuto} onClick={() => setPensionAuto(true)}>収入から自動</Pill>
                      <Pill active={!pensionAuto} onClick={() => { setPensionAuto(false); setPension(estPension); }}>手入力（推奨）</Pill>
                    </div>
                  </div>
                  {pensionAuto ? (
                    <p className="mt-1.5 text-[14px] font-black tabular-nums" style={{ color: C.sage }}>
                      約 {estPension} 万／月
                      <span className="ml-1 text-[11px] font-medium" style={{ color: C.sub }}>
                        （あなた{pensionForPerson(jobSelf, incomeM)}万{hasSpouse ? ` ＋ 配偶者${pensionForPerson(jobSpouse, incomeSpouseM)}万` : ""}）
                      </span>
                    </p>
                  ) : (
                    <Stepper label="ねんきん定期便の額（世帯・月）" value={pension} onChange={setPension} unit="万" />
                  )}
                  <p className="mt-0.5 text-[11px] leading-relaxed" style={{ color: C.sub }}>
                    💡 あなたと配偶者の「働き方」から自動で目安を計算しています（基礎年金＋会社員は厚生年金分）。<b style={{ color: C.coral }}>正確に見たいときは「手入力」にして、ねんきん定期便（またはねんきんネット）の見込み額（世帯合計）を入れてください。</b>
                  </p>
                </div>
                <Stepper label="リタイア後の生活費（月）" value={livingRetireM} onChange={setLivingRetireM} unit="万" step={1} hint="退職後は教育費・通勤・食費が減り、現役より下がる家庭が多い。現役と同額にすれば下げません" />
                <Stepper label="想定利回り" value={rate} onChange={setRate} unit="%" step={0.5} max={7} hint="NISAなど長期運用なら2〜3%が控えめな目安" />
                <Stepper label="インフレ率" value={inflation} onChange={setInflation} unit="%" step={0.5} max={5} hint="物価上昇。生活費・教育費が毎年これだけ上がる前提。控えめなら1〜2%" />
                <Stepper label="昇給率" value={raiseRate} onChange={setRaiseRate} unit="%" step={0.5} max={5} hint="現役の収入が毎年これだけ増える前提。インフレ率と同じなら実質横ばい。0にすると一生同じ収入" />
                <Stepper label="退職金（一時金）" value={retireBonus} onChange={setRetireBonus} unit="万" step={100} max={5000} hint="リタイア年に一度だけ入るお金。なければ0に" />
                <Stepper label="大型支出（1回）" value={bigSpend} onChange={setBigSpend} unit="万" step={50} max={2000} hint="車の買い替え・住宅修繕・家電などのまとまった出費" />
                <Stepper label="大型支出のペース" value={bigSpendEvery} onChange={setBigSpendEvery} unit="年ごと" step={1} min={1} max={20} hint="上の支出を何年ごとに見込むか" />
              </div>
            </details>
          </div>

          {/* ── 結果 ── */}
          <div className="space-y-4">
            {/* あんしんメッセージ */}
            <div
              className="rounded-3xl p-4 sm:p-5"
              style={{
                background: ok ? C.sageSoft : "#FAEDE9",
                border: `1.5px solid ${ok ? C.sage : C.alert}`,
              }}
            >
              <p className="mb-1 text-xs font-black" style={{ color: ok ? C.sage : C.alert }}>
                {ok ? "🌱 だいじょうぶ、土台はできています" : "💡 見直しどきが見つかりました"}
              </p>
              <p className="text-[14px] leading-relaxed">{summary}</p>
            </div>

            {/* ★ 見直しレバー */}
            <Card icon="✨" title="未来を動かすレバー">
              <div className="space-y-3 pt-1">
                <div>
                  <div className="flex items-baseline justify-between">
                    <span className="text-sm font-medium">固定費を見直す（保険・通信・サブスク）</span>
                    <span className="text-base font-black tabular-nums" style={{ color: C.sage }}>
                      月 −{yenFromMan(cutM)}円
                    </span>
                  </div>
                  <input
                    type="range"
                    min={0}
                    max={5}
                    step={0.1}
                    value={cutM}
                    onChange={(e) => setCutM(parseFloat(e.target.value))}
                    className="w-full"
                    aria-label="固定費の見直し額"
                  />
                </div>
                <div>
                  <div className="flex items-baseline justify-between">
                    <span className="text-sm font-medium">収入をふやす（働き方・副収入）</span>
                    <span className="text-base font-black tabular-nums" style={{ color: C.sage }}>
                      月 ＋{yenFromMan(upM)}円
                    </span>

                  <input

                    min={0}

                    value={upM}

                <div>
                  <div className="flex items-baseline justify-between">

            </Card>

            {/* ポイント3つ */}
            <div className="grid grid-cols-1 gap-2 sm:grid-cols-3">
              {[
                { k: "リタイア時の貯金", v: view.atRetire, c: C.ink },
                { k: "いちばん薄くなる時期", v: view.bottom.bal, c: view.bottom.bal < 0 ? C.alert : C.sage, sub: `${view.bottom.age}歳ごろ` },
                {
                  k: "教育費がピークの年",
                  v: Math.max(...view.rows.map((r) => r.edu)),
                  c: C.honey,
                  sub: `${view.rows.reduce((m, r) => (r.edu > m.edu ? r : m), view.rows[0]).age}歳ごろ`,
                },
              ].map((x) => (
                <div key={x.k} className="flex items-baseline justify-between gap-2 rounded-2xl px-4 py-3 sm:block sm:p-4" style={{ background: C.card, border: `1px solid ${C.line}` }}>
                  <p className="text-xs" style={{ color: C.sub }}>
                    {x.k}
                    {x.sub && <span className="ml-1 sm:hidden">（{x.sub}）</span>}
                  </p>
                  <p className="text-lg font-black tabular-nums sm:mt-1" style={{ color: x.c }}>
                    {fmtMan(x.v ?? 0)}
                  </p>
                  {x.sub && <p className="hidden text-[11px] sm:block" style={{ color: C.sub }}>{x.sub}</p>}
                </div>
              ))}
            </div>

            {/* Die With Zero の視点 */}
            <Card icon="🎈" title="つかいきる、という視点">
              <p className="text-[13px] leading-relaxed">
                このままだと、{endAge}歳の時点で
                <span className="mx-1 text-xl font-black tabular-nums" style={{ color: C.coral }}>
                  {fmtMan(finalBal)}
                </span>
                {finalBal >= 0 ? "残る見込みです。" : "足りない見込みです。"}
              </p>
              {finalBal > 1000 && (
                <p className="mt-2 text-[13px] leading-relaxed">
                  残ったお金は、言いかえると「使えたのに使わなかった経験」です。思い出は若いうちに作るほど、長く何度も配当をくれます。上のレバーの「思い出につかう」を動かして、どこまで使っても大丈夫かを確かめてみてください。貯めるのが目的じゃなく、安心して使えるようになるのが目的です。
                </p>
              )}
              {kidTimes.length > 0 && (
                <div className="mt-3 rounded-2xl px-4 py-3" style={{ background: C.coralSoft }}>
                  <p className="mb-1 text-xs font-black" style={{ color: C.coral }}>
                    ⏳ 家族の時間にも、じつは期限があります
                  </p>
                  {kidTimes.map((x) => (
                    <p key={x.n} className="text-[13px] font-bold leading-relaxed">
                      {x.n}人目と家族旅行に行ける夏休みは、あと{x.left}回
                    </p>
                  ))}
                  <p className="mt-1 text-[11px]" style={{ color: C.sub }}>
                    お金はあとから増やせても、この回数だけは増やせません。
                  </p>
                </div>
              )}
            </Card>

            {/* きょうの1歩 */}
            <div className="rounded-3xl p-4 text-center sm:p-5" style={{ background: C.coralSoft, border: `1.5px solid ${C.coral}` }}>
              <p className="text-xs font-black" style={{ color: C.coral }}>
                🍀 きょうの1歩
              </p>
              <p className="mt-1 text-[14px] font-bold leading-relaxed">
                {ok
                  ? "数字より先に、順番。まずはスマホ料金か保険、どちらか1つだけ明細を開いてみる。それで十分です。"
                  : "焦らなくて大丈夫。固定費の中でいちばん大きいもの（保険か住居）を1つ、今週だけ見直してみる。レバーで試した金額が、現実の目標になります。"}
              </p>
            </div>

            <p className="px-1 text-[11px] leading-relaxed" style={{ color: C.sub }}>
              ※ 教育費・利回り・インフレ率は平均的な目安です。大型支出（車の買い替え・住宅の修繕など）はざっくりの見込みで計上しており、介護費用までは含めていません。ここで見えた「気になるところ」を、面談で一緒に詰めていきましょう。
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<LifePlanSimulator />);
  </script>
</body>
</html>
